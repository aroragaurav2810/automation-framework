name: Run Automation Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # ✅ ADD THIS BLOCK HERE
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Tests
        run: mvn clean test

      # 🔥 Login to GHCR
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🔥 Build Docker Image
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ github.actor }}/automation-framework:latest .

      # 🔥 Push Docker Image
      - name: Push Docker Image
        run: docker push ghcr.io/${{ github.actor }}/automation-framework:latest
